name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: |
          echo " Dependencies installed successfully"
          echo " Packages:"
          npm ls --depth=0

      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo " RENDER_DEPLOY_HOOK_URL secret is not set!"
            echo " Go to your Render dashboard → Service → Settings → Deploy Hook"
            echo " Copy the URL and add it as a GitHub secret named RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

          echo " Triggering Render deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL")

          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo " Render deployment triggered successfully! (HTTP $RESPONSE)"
            echo " Check status at: https://dashboard.render.com"
          else
            echo " Failed to trigger deployment (HTTP $RESPONSE)"
            exit 1
          fi
